version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd Event-Driven-Legal-System-Using-AI/legal-dashboard
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: Event-Driven-Legal-System-Using-AI/legal-dashboard/build
  cache:
    paths:
      - node_modules/**/*